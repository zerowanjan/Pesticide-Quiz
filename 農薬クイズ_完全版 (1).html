<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>農薬知識 穴埋めクイズ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--g:#2d6a4f;--g2:#40916c;--gp:#dcfce7;--bg:#f2f7f3;--bd:#c8e6c9;--nav-h:54px}
body{font-family:"Noto Sans JP",sans-serif;background:var(--bg);color:#1a2e1a;min-height:100vh}
nav{background:linear-gradient(135deg,#1b4332,#2d6a4f);color:#fff;padding:0 18px;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;box-shadow:0 2px 8px rgba(0,0,0,.2)}
#stickyQ{position:sticky;top:var(--nav-h);z-index:200;background:linear-gradient(135deg,#1b4332,#2d6a4f);box-shadow:0 4px 12px rgba(0,0,0,.2);display:none}
#quizScreen.active #stickyQ{display:block}
.sticky-top{padding:8px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.15)}
.sticky-prod-name{font-weight:900;font-size:.92rem;color:#fff;flex:1;overflow:hidden;word-break:break-all}
.sticky-cat{border-radius:16px;padding:2px 9px;font-size:.64rem;font-weight:700;color:#fff;white-space:nowrap;flex-shrink:0}
.sticky-prog{font-size:.7rem;color:rgba(255,255,255,.75);flex-shrink:0}
.sticky-desc{padding:10px 16px 12px;font-size:.86rem;line-height:2;color:rgba(255,255,255,.88);white-space:pre-line;max-height:40vh;overflow-y:auto}
.blank-pill{display:inline-block;border-radius:5px;padding:1px 7px;font-weight:700;font-size:.75rem;vertical-align:middle;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:rgba(255,255,255,.25);color:#fff;border:1px solid rgba(255,255,255,.4)}
.pill-answered{background:rgba(255,255,255,.9)!important;color:#1d4ed8!important}
.pill-correct{background:#16a34a!important;color:#fff!important;border-color:#16a34a!important}
.pill-wrong{background:#dc2626!important;color:#fff!important;border-color:#dc2626!important}
.screen{display:none}.screen.active{display:block}
.wrap{max-width:600px;margin:0 auto;padding:20px 14px 80px}
.start-full{min-height:calc(100vh - var(--nav-h));background:linear-gradient(160deg,#1b4332 0%,#2d6a4f 50%,#40916c 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px 60px}
.start-icon{font-size:4rem;margin-bottom:16px;display:block;text-align:center}
.start-title{font-size:2rem;font-weight:900;color:#fff;text-align:center;line-height:1.25;margin-bottom:8px}
.start-sub{font-size:.88rem;color:rgba(255,255,255,.7);text-align:center;margin-bottom:28px}
.count-row{display:flex;gap:10px;margin-bottom:20px;justify-content:center;flex-wrap:wrap}
.count-btn{padding:10px 22px;border-radius:24px;border:2px solid rgba(255,255,255,.35);background:transparent;color:#fff;font-family:inherit;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .15s}
.btn-start{display:block;width:100%;max-width:320px;background:#fff;color:#1b4332;border:none;border-radius:14px;padding:16px;font-size:1.05rem;font-weight:900;cursor:pointer;font-family:inherit;margin-bottom:20px;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.filter-toggle{background:transparent;border:1.5px solid rgba(255,255,255,.35);color:rgba(255,255,255,.8);border-radius:24px;padding:8px 18px;font-family:inherit;font-size:.8rem;cursor:pointer;margin-bottom:14px}
.filter-panel{width:100%;max-width:480px;background:rgba(255,255,255,.1);border-radius:16px;padding:16px;display:none}
.filter-panel-title{color:rgba(255,255,255,.7);font-size:.75rem;font-weight:700;margin-bottom:10px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 11px;border-radius:20px;border:1.5px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);font-size:.75rem;cursor:pointer;font-family:inherit;font-weight:600;color:rgba(255,255,255,.8);transition:all .15s}
.prog-bar{background:#dce8dc;border-radius:8px;height:6px;margin-bottom:12px;overflow:hidden}
.prog-fill{background:linear-gradient(90deg,var(--g),#86efac);height:100%;border-radius:8px;transition:width .4s}
.quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.q-num{font-weight:900;font-size:.92rem}
.card{background:#fff;border-radius:14px;padding:15px;margin-bottom:12px;border:1.5px solid var(--bd);box-shadow:0 3px 12px rgba(45,106,79,.07)}
.blank-item{background:#f8fbf8;border-radius:10px;padding:11px;border:1.5px solid var(--bd);margin-bottom:8px}
.blank-item.answered{border-color:#93c5fd}
.blank-key{display:inline-block;border-radius:6px;padding:1px 8px;font-weight:700;font-size:.72rem;margin-bottom:7px;color:#fff;background:#d97706}
.blank-key.ka{background:#2563eb}
.blank-hint{font-size:.69rem;color:#9ca3af;margin-left:6px;font-weight:400}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.choice{padding:7px 9px;border-radius:8px;border:1.5px solid var(--bd);background:#fff;font-family:inherit;font-size:.78rem;cursor:pointer;text-align:left;line-height:1.4;color:#1a2e1a;transition:all .12s}
.choice:hover{border-color:var(--g);background:var(--gp)}
.choice.selected{border-color:#3b82f6;background:#eff6ff;color:#1d4ed8;font-weight:700}
.choice.correct{border-color:#16a34a;background:#dcfce7;color:#15803d;font-weight:700}
.choice.wrong{border-color:#dc2626;background:#fee2e2;color:#dc2626;font-weight:700}
.explanation{margin-top:12px;border-radius:10px;overflow:hidden;border:1.5px solid #c8e6c9}
.exp-head{background:#ecfdf5;padding:8px 13px;font-size:.74rem;font-weight:700;color:var(--g);border-bottom:1px solid #c8e6c9}
.exp-row{display:flex;gap:8px;padding:7px 13px;border-bottom:1px solid #f0fdf4;font-size:.77rem;align-items:flex-start}
.exp-row:last-child{border-bottom:none}
.exp-key{font-weight:700;min-width:20px;color:#6b7280;flex-shrink:0}
.exp-label{color:#9ca3af;min-width:76px;font-size:.7rem;padding-top:1px;flex-shrink:0}
.exp-correct{color:#15803d;font-weight:700;flex:1}
.result-bar{border-radius:10px;padding:10px 13px;margin-top:11px;font-weight:700;font-size:.85rem;display:none}
.bar-ok{background:#dcfce7;color:#15803d;border:1.5px solid #16a34a}
.bar-half{background:#fef3c7;color:#92400e;border:1.5px solid #d97706}
.bar-fail{background:#fee2e2;color:#dc2626;border:1.5px solid #dc2626}
.actions{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1.5px solid var(--bd);padding:10px 14px 14px;z-index:250;box-shadow:0 -3px 10px rgba(0,0,0,.08)}
.actions-inner{display:flex;gap:8px;width:100%;max-width:600px;margin:0 auto}
.btn-check{flex:1;padding:12px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--g),var(--g2));color:#fff;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer}
.btn-check:disabled{background:#d1d5db;cursor:not-allowed}
.btn-next-q{flex:1;padding:12px;border-radius:11px;border:none;background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;display:none}
.result-hero{background:linear-gradient(135deg,#1b4332,#2d6a4f);color:#fff;border-radius:20px;padding:32px 22px;text-align:center;margin-bottom:14px}
.result-score{font-size:2.9rem;font-weight:900}
.result-rank{display:inline-block;background:rgba(255,255,255,.2);border-radius:20px;padding:5px 18px;margin-top:11px;font-weight:700}
.history{background:#fff;border-radius:13px;overflow:hidden;border:1.5px solid var(--bd);margin-bottom:13px}
.history-head{padding:10px 14px;font-weight:700;border-bottom:1px solid #e5e7eb;color:var(--g);font-size:.85rem}
.history-item{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid #f3f4f6;gap:8px;font-size:.8rem}
.history-item:last-child{border-bottom:none}
.h-name{flex:1;font-weight:500}
.btn-re{display:block;width:100%;border:none;border-radius:12px;padding:14px;font-size:.98rem;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:11px;text-align:center}
.btn-re.primary{background:linear-gradient(135deg,var(--g),var(--g2));color:#fff;box-shadow:0 4px 14px rgba(45,106,79,.3)}
.btn-re.secondary{background:#fff;color:#374151;border:1.5px solid var(--bd) !important}
@media(max-width:460px){.choices{grid-template-columns:1fr}.count-row{gap:7px}.count-btn{padding:9px 16px;font-size:.88rem}}
</style>
</head>
<body>
<nav>
  <b style="font-size:.95rem">🌾 農薬クイズ</b>
  <span id="navBadge" style="background:rgba(255,255,255,.15);border-radius:20px;padding:4px 12px;font-size:.76rem;font-weight:700">スコア: 0 / 0</span>
</nav>


<div class="screen active" id="startScreen">
  <div class="start-full">
    <span class="start-icon">🌾</span>
    <div class="start-title">農薬知識<br>穴埋めクイズ</div>
    <div class="start-sub">374問収録　有効成分・作用機構を学ぼう</div>
    <div class="count-row" id="countChips">
      <button class="count-btn chip" data-n="10">10問</button>
      <button class="count-btn chip" data-n="20">20問</button>
      <button class="count-btn chip" data-n="30">30問</button>
      <button class="count-btn chip" data-n="50">50問</button>
    </div>
    <button class="btn-start" onclick="startQuiz()">🚀 スタート</button>
    <button class="filter-toggle" id="filterToggle" onclick="toggleFilter()">▼ 詳細設定（絞り込み）</button>
    <div class="filter-panel" id="filterPanel">
      <div class="filter-panel-title">農薬種類を絞り込む（未選択＝全て）</div>
      <div class="chips" id="groupChips"></div>
    </div>
  </div>
</div>

<div class="screen" id="quizScreen">
  <div id="stickyQ">
    <div class="sticky-top"><span class="sticky-prod-name" id="stickyName"></span><span class="sticky-cat" id="stickyCat"></span><span class="sticky-prog" id="stickyProg"></span></div>
    <div class="sticky-desc" id="stickyDesc"></div>
  </div>
  <div class="wrap">
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="quiz-meta"><span class="q-num" id="qNum">問題 1 / 10</span></div>
    <div class="card"><div id="blanksArea"></div><div class="result-bar" id="resultBar"></div><div id="explanationArea"></div></div>
  </div>
  <div class="actions"><div class="actions-inner">
    <button class="btn-check" id="btnCheck" onclick="checkAnswers()" disabled>採点する</button>
    <button class="btn-next-q" id="btnNext" onclick="nextQ()">次の問題へ →</button>
  </div></div>
</div>

<div class="screen" id="resultScreen"><div class="wrap">
  <div class="result-hero">
    <div id="rTrophy" style="font-size:3.3rem;margin-bottom:9px">🏆</div>
    <div class="result-score" id="rScore">0 / 0</div>
    <div style="font-size:.82rem;opacity:.8;margin-top:4px">穴埋め正解数</div>
    <div class="result-rank" id="rRank">判定</div>
  </div>
  <div class="history"><div class="history-head">📋 問題履歴</div><div id="histList"></div></div>
  <button class="btn-re primary" onclick="startQuiz()">🔄 もう一度挑戦</button>
  <button class="btn-re secondary" onclick="show('startScreen')">⬅ スタートに戻る</button>
</div></div>

const HINT={a:"有効成分",b:"化学系統",c:"防除対象・特徴",d:"作用機構",e:"農薬分類コード"};
let queue=[],idx=0,ans={},checked=false,totC=0,totB=0,hist=[],selCount=10,selGroups=new Set();
let filterOpen=false;

const gc=document.getElementById("groupChips");
GROUPS_ORDER.forEach(g=>{
  const cnt=QUESTIONS.filter(q=>q.group===g).length;
  if(!cnt)return;
  const d=document.createElement("div");
  d.className="chip";d.dataset.g=g;
  d.textContent=g+" ("+cnt+")";
  const col=GROUP_COLORS[g]||"#2d6a4f";
  d.style.borderColor=col;
  d.onclick=()=>{
    if(selGroups.has(g)){selGroups.delete(g);d.style.background="rgba(255,255,255,.1)";d.style.color="rgba(255,255,255,.8)";}
    else{selGroups.add(g);d.style.background=col;d.style.color="#fff";}
  };
  gc.appendChild(d);
});

const cchips=document.querySelectorAll("#countChips .chip");
cchips.forEach(c=>{
  c.onclick=()=>{
    cchips.forEach(x=>{x.style.background="transparent";x.style.color="#fff";x.style.borderColor="rgba(255,255,255,.35)";});
    c.style.background="#fff";c.style.color="#1b4332";c.style.borderColor="#fff";
    selCount=+c.dataset.n;
  };
});
cchips[0].style.background="#fff";cchips[0].style.color="#1b4332";cchips[0].style.borderColor="#fff";

function toggleFilter(){
  filterOpen=!filterOpen;
  document.getElementById("filterPanel").style.display=filterOpen?"block":"none";
  document.getElementById("filterToggle").textContent=filterOpen?"▲ 絞り込みを閉じる":"▼ 詳細設定（絞り込み）";
}

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");}

function startQuiz(){
  let pool=selGroups.size>0?QUESTIONS.filter(q=>selGroups.has(q.group)):QUESTIONS;
  if(!pool.length){alert("該当する問題がありません");return;}
  queue=shuffle(pool).slice(0,Math.min(selCount,pool.length));
  idx=0;totC=0;totB=0;hist=[];
  show("quizScreen");renderQ();
}

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function makeDescHtml(q){
  let txt=q.text;
  ["a","b","c","d","e"].forEach(k=>{
    if(!q.blanks[k])return;
    let cls="blank-pill";let label="（"+k+"）";
    if(checked){
      cls+=(ans[k]===q.blanks[k])?" pill-correct":" pill-wrong";
      label=(ans[k]===q.blanks[k])?("✓"+q.blanks[k]):("✗→"+q.blanks[k]);
    }else if(ans[k]){cls+=" pill-answered";label=ans[k];}
    txt=txt.split("（"+k+"）").join("<span class=\""+cls+"\">"+esc(label)+"</span>");
  });
  return txt;
}

function updateStickyHeader(q){
  document.getElementById("stickyName").textContent=q.name;
  const sc=document.getElementById("stickyCat");
  sc.textContent=q.group||q.category;
  sc.style.background=GROUP_COLORS[q.group]||CAT_COLORS[q.category]||"#2d6a4f";
  document.getElementById("stickyProg").textContent=(idx+1)+"/"+queue.length;
  document.getElementById("stickyDesc").innerHTML=makeDescHtml(q);
}

function renderQ(){
  const q=queue[idx];
  ans={};checked=false;
  document.getElementById("progFill").style.width=(idx/queue.length*100)+"%";
  document.getElementById("qNum").textContent="問題 "+(idx+1)+" / "+queue.length;
  document.getElementById("navBadge").textContent="スコア: "+totC+" / "+totB;
  updateStickyHeader(q);
  const area=document.getElementById("blanksArea");
  area.innerHTML="";
  ["a","b","c","d","e"].filter(k=>q.blanks[k]).forEach(k=>{
    const item=document.createElement("div");
    item.className="blank-item";item.id="item-"+k;
    const keySpan=document.createElement("span");keySpan.className="blank-key";keySpan.id="key-"+k;keySpan.textContent="（"+k+"）";
    const hintSpan=document.createElement("span");hintSpan.className="blank-hint";hintSpan.textContent=HINT[k]||"";
    const hdr=document.createElement("div");hdr.appendChild(keySpan);hdr.appendChild(hintSpan);
    const grid=document.createElement("div");grid.className="choices";
    q.choices[k].forEach(opt=>{
      const b=document.createElement("button");b.className="choice";b.textContent=opt;b.dataset.val=opt;
      b.onclick=()=>selectAns(k,b);grid.appendChild(b);
    });
    item.appendChild(hdr);item.appendChild(grid);area.appendChild(item);
  });
  document.getElementById("resultBar").style.display="none";
  document.getElementById("explanationArea").innerHTML="";
  document.getElementById("btnCheck").disabled=true;
  document.getElementById("btnCheck").style.display="";
  document.getElementById("btnNext").style.display="none";
  window.scrollTo({top:0,behavior:"smooth"});
}

function selectAns(k,btn){
  if(checked)return;
  const q=queue[idx];
  document.querySelectorAll("#item-"+k+" .choice").forEach(b=>b.classList.remove("selected"));
  btn.classList.add("selected");ans[k]=btn.dataset.val;
  document.getElementById("item-"+k).classList.add("answered");
  document.getElementById("key-"+k).className="blank-key ka";
  document.getElementById("stickyDesc").innerHTML=makeDescHtml(q);
  document.getElementById("btnCheck").disabled=!Object.keys(q.blanks).filter(k2=>q.blanks[k2]).every(k2=>ans[k2]);
}

function checkAnswers(){
  checked=true;
  const q=queue[idx];const keys=Object.keys(q.blanks).filter(k=>q.blanks[k]);
  let correct=0;
  keys.forEach(k=>{
    const ok=ans[k]===q.blanks[k];if(ok)correct++;
    document.querySelectorAll("#item-"+k+" .choice").forEach(b=>{
      b.disabled=true;
      if(b.dataset.val===q.blanks[k])b.classList.add("correct");
      else if(b.classList.contains("selected")&&!ok)b.classList.add("wrong");
    });
  });
  totC+=correct;totB+=keys.length;hist.push({name:q.name,correct:correct,total:keys.length});
  document.getElementById("navBadge").textContent="スコア: "+totC+" / "+totB;
  document.getElementById("stickyDesc").innerHTML=makeDescHtml(q);
  const rb=document.getElementById("resultBar");
  const allok=correct===keys.length,half=correct>0;
  rb.className="result-bar "+(allok?"bar-ok":half?"bar-half":"bar-fail");
  rb.textContent=(allok?"🎉":half?"👍":"😅")+" "+correct+" / "+keys.length+" 問正解";
  rb.style.display="block";
  const expDiv=document.getElementById("explanationArea");expDiv.innerHTML="";
  const wrap=document.createElement("div");wrap.className="explanation";
  const head=document.createElement("div");head.className="exp-head";head.textContent="📖 解説・正解一覧";
  wrap.appendChild(head);
  keys.forEach(k=>{
    const row=document.createElement("div");row.className="exp-row";const ok=ans[k]===q.blanks[k];
    row.innerHTML="<span class=\"exp-key\">"+(ok?"✅":"❌")+"</span><span class=\"exp-label\">"+(HINT[k]||k)+"</span><span class=\"exp-correct\">"+esc(q.blanks[k])+"</span>";
    wrap.appendChild(row);
  });
  expDiv.appendChild(wrap);
  document.getElementById("btnCheck").style.display="none";
  document.getElementById("btnNext").style.display="block";
}

function nextQ(){idx++;if(idx>=queue.length){showResult();return;}renderQ();}

function showResult(){
  show("resultScreen");
  const pct=totB>0?totC/totB:0;
  document.getElementById("rScore").textContent=totC+" / "+totB;
  document.getElementById("rTrophy").textContent=pct>=.9?"🏆":pct>=.75?"🥇":pct>=.6?"🥈":"📚";
  document.getElementById("rRank").textContent=pct>=.9?"Sランク：農薬マスター！":pct>=.75?"Aランク：優秀！":pct>=.6?"Bランク：合格！":pct>=.4?"Cランク：もう少し":"D：要復習";
  const listEl=document.getElementById("histList");listEl.innerHTML="";
  hist.forEach(h=>{
    const div=document.createElement("div");div.className="history-item";
    const col=h.correct===h.total?"#16a34a":h.correct>0?"#d97706":"#dc2626";
    const badge=h.correct===h.total?"✅":h.correct>0?"⚡":"❌";
    div.innerHTML="<span>"+badge+"</span><span class=\"h-name\">"+esc(h.name)+"</span><span style=\"font-weight:700;min-width:44px;text-align:right;color:"+col+"\">"+h.correct+"/"+h.total+"</span>";
    listEl.appendChild(div);
  });
}

</script>
</body>
</html>
